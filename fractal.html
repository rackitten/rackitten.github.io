<!doctype html>

<html>
  <head>
    <meta charset="utf-8">
    <title>This is what Heaven looks like</title>
  </head>
  <body style="display:block; margin:0; overflow:hidden; background:#000;">
    <canvas id="myCanvas" style="display:block; width:100vw; height:100vh;"></canvas>
    <div id="hud" style="position:fixed; left:8px; bottom:8px; font:12px monospace; color:#0f0; opacity:.6; pointer-events:none;"></div>
    <script type="module">
        // ─────────────────────────────────────────────────────────────────────
        //  Near-infinite Mandelbrot zoom via perturbation theory.
        //
        //  CPU keeps the view CENTER at double-double (~32 digit) precision and
        //  computes a reference orbit X[n] = X[n-1]^2 + C_center there. The GPU
        //  then iterates only each pixel's tiny offset delta from that orbit:
        //      delta -> 2*X[n]*delta + delta^2 + c
        //  which stays small enough to live happily in f32. Zhuoran rebasing
        //  ( reset delta<-X[n]+delta, n<-0 when |X[n]+delta| < |delta| ) makes a
        //  single reference orbit cover the whole image without glitch bands.
        // ─────────────────────────────────────────────────────────────────────

        const canvas = document.getElementById('myCanvas');
        const hud = document.getElementById('hud');

        // Surface failures on-screen instead of leaving a silent black canvas.
        function showError(msg) {
            console.error(msg);
            let box = document.getElementById('err');
            if (!box) {
                box = document.createElement('div');
                box.id = 'err';
                box.style.cssText = "position:fixed;inset:0;display:flex;align-items:center;justify-content:center;"
                    + "padding:24px;font:14px/1.5 monospace;color:#f55;background:#111;white-space:pre-wrap;text-align:center;";
                document.body.appendChild(box);
            }
            box.textContent = "⚠ " + msg;
        }
        window.addEventListener('error', (e) => showError(e.message));
        window.addEventListener('unhandledrejection', (e) => showError((e.reason && e.reason.message) || String(e.reason)));

        // Cap the internal render resolution so we never melt the GPU. The
        // canvas still fills the window via CSS (it just upscales). Bump
        // MAX_DIM up if your GPU is beefy and you want crisper output.
        const MAX_DIM = 1000;
        function resizeCanvas() {
            const scale = Math.min(1, MAX_DIM / Math.max(window.innerWidth, window.innerHeight));
            canvas.width = Math.max(1, Math.round(window.innerWidth * scale));
            canvas.height = Math.max(1, Math.round(window.innerHeight * scale));
        }
        window.addEventListener('resize', resizeCanvas, false);
        resizeCanvas();

        // ── double-double arithmetic (a value is a [hi, lo] pair of doubles) ──
        const SPLIT = 134217729; // 2^27 + 1, for Veltkamp splitting
        function twoSum(a, b) { const s = a + b; const bb = s - a; return [s, (a - (s - bb)) + (b - bb)]; }
        function quickTwoSum(a, b) { const s = a + b; return [s, b - (s - a)]; }
        function split(a) { const c = SPLIT * a; const hi = c - (c - a); return [hi, a - hi]; }
        function twoProd(a, b) {
            const p = a * b;
            const [ah, al] = split(a), [bh, bl] = split(b);
            return [p, ((ah * bh - p) + ah * bl + al * bh) + al * bl];
        }
        function ddAdd(a, b) { let [s, e] = twoSum(a[0], b[0]); e += a[1] + b[1]; return quickTwoSum(s, e); }
        function ddSub(a, b) { return ddAdd(a, [-b[0], -b[1]]); }
        function ddMul(a, b) { let [p, e] = twoProd(a[0], b[0]); e += a[0] * b[1] + a[1] * b[0]; return quickTwoSum(p, e); }
        function ddMulD(a, s) { let [p, e] = twoProd(a[0], s); e += a[1] * s; return quickTwoSum(p, e); }

        // ── WebGPU setup ──
        if (!navigator.gpu) throw new Error("WebGPU not supported on this browser.");
        const adapter = await navigator.gpu.requestAdapter({ powerPreference: "high-performance" });
        if (!adapter) throw new Error("No appropriate GPUAdapter found.");
        const device = await adapter.requestDevice();
        const context = canvas.getContext("webgpu");
        const canvasFormat = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format: canvasFormat });

        // ── view state (double-double center + double-precision width) ──
        const FULL_WIDTH = 4.0;     // real-axis span showing the whole set
        const SHRINK = 0.99;        // per-frame zoom factor (smaller = faster)
        const MIN_WIDTH = 1e-30;    // floor where double-double precision runs out
        const MAX_ITER_CAP = 500;   // hard cap on iterations/pixel (keeps GPU load safe)

        let centerX = [0, 0], centerY = [0, 0];   // dd
        let viewWidth = FULL_WIDTH;
        // Default zoom target: a detail-rich point in Seahorse Valley.
        let targetX = [-0.7436438870371587, -4.7527e-18];
        let targetY = [0.13182590420531197, 8.01e-19];

        // ── GPU buffers ──
        // Uniforms: res.xy, viewWidth, aspect(=h/w), maxIter, refLen  (+pad -> 32B)
        const uniformData = new Float32Array(8);
        const uniformBuffer = device.createBuffer({
            label: "Params",
            size: uniformData.byteLength,
            usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        });

        // Reference orbit: interleaved f32 [Xr0, Xi0, Xr1, Xi1, ...].
        const refData = new Float32Array(2 * MAX_ITER_CAP);
        const refBuffer = device.createBuffer({
            label: "Reference orbit",
            size: refData.byteLength,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        });

        // Compute the reference orbit at double-double precision; store hi parts
        // as f32. Returns the orbit length (stops once it escapes |X|>2).
        function computeReference(cx, cy, maxIter) {
            let zx = [0, 0], zy = [0, 0];
            let len = 0;
            for (let k = 0; k < maxIter; k++) {
                refData[2 * k] = zx[0];
                refData[2 * k + 1] = zy[0];
                len = k + 1;
                if (zx[0] * zx[0] + zy[0] * zy[0] > 4.0) break; // reference escaped
                // z = z^2 + c
                const zx2 = ddSub(ddMul(zx, zx), ddMul(zy, zy));
                const zy2 = ddMulD(ddMul(zx, zy), 2.0);
                zx = ddAdd(zx2, cx);
                zy = ddAdd(zy2, cy);
            }
            return Math.max(len, 2);
        }

        const shaderModule = device.createShaderModule({
            label: "Perturbation Mandelbrot",
            code: `
            struct Params {
                res: vec2f,
                viewWidth: f32,
                aspect: f32,
                maxIter: f32,
                refLen: f32,
            };

            @group(0) @binding(0) var<uniform> P: Params;
            @group(0) @binding(1) var<storage> orbit: array<f32>;

            // Full-screen triangle from the vertex index — no vertex buffer needed.
            @vertex
            fn vertexMain(@builtin(vertex_index) vi: u32) -> @builtin(position) vec4f {
                var p = array<vec2f, 3>(vec2f(-1.0, -1.0), vec2f(3.0, -1.0), vec2f(-1.0, 3.0));
                return vec4f(p[vi], 0.0, 1.0);
            }

            fn palette(t: f32) -> vec3f {
                return 0.5 + 0.5 * cos(6.28318 * (t + vec3f(0.0, 0.33, 0.67)));
            }

            @fragment
            fn fragmentMain(@builtin(position) fragPos: vec4f) -> @location(0) vec4f {
                // Pixel offset c from the reference center (small -> f32 is fine).
                let uv = fragPos.xy / P.res;
                let cr = (uv.x - 0.5) * P.viewWidth;
                let ci = (0.5 - uv.y) * P.viewWidth * P.aspect;

                let maxI = u32(P.maxIter);
                let refLen = u32(P.refLen);

                var dr = 0.0;  var di = 0.0;   // delta (perturbation)
                var m = 0u;                    // reference orbit index
                var iter = 0u;
                var escaped = false;
                var zmag2 = 0.0;

                loop {
                    if (iter >= maxI) { break; }

                    let Xr = orbit[2u * m];
                    let Xi = orbit[2u * m + 1u];

                    // delta -> 2*X[m]*delta + delta^2 + c
                    let dr2 = dr * dr - di * di;
                    let di2 = 2.0 * dr * di;
                    let crossR = 2.0 * (Xr * dr - Xi * di);
                    let crossI = 2.0 * (Xr * di + Xi * dr);
                    dr = crossR + dr2 + cr;
                    di = crossI + di2 + ci;
                    m = m + 1u;
                    iter = iter + 1u;

                    // Full value z = X[m] + delta.
                    let Zr = orbit[2u * m] + dr;
                    let Zi = orbit[2u * m + 1u] + di;
                    zmag2 = Zr * Zr + Zi * Zi;
                    if (zmag2 > 4.0) { escaped = true; break; }

                    // Zhuoran rebasing: keep delta small + dodge glitches.
                    let dmag2 = dr * dr + di * di;
                    if (zmag2 < dmag2 || m + 1u >= refLen) {
                        dr = Zr; di = Zi; m = 0u;
                    }
                }

                if (!escaped) {
                    return vec4f(0.0, 0.0, 0.0, 1.0); // inside the set
                }

                // Smooth (continuous) iteration count for banding-free color.
                let logZn = 0.5 * log(zmag2);
                let nu = log(logZn / log(2.0)) / log(2.0);
                let sn = max(f32(iter) + 1.0 - nu, 0.0);
                return vec4f(palette(sn * 0.035 + 0.5), 1.0);
            }
            `
        });

        const bindGroupLayout = device.createBindGroupLayout({
            label: "Bind group layout",
            entries: [
                { binding: 0, visibility: GPUShaderStage.VERTEX | GPUShaderStage.FRAGMENT, buffer: {} },
                { binding: 1, visibility: GPUShaderStage.FRAGMENT, buffer: { type: "read-only-storage" } },
            ]
        });
        // Report any WGSL compilation problems explicitly.
        const compInfo = await shaderModule.getCompilationInfo();
        for (const m of compInfo.messages) {
            console[m.type === 'error' ? 'error' : 'log'](`WGSL ${m.type} @${m.lineNum}:${m.linePos} — ${m.message}`);
        }
        if (compInfo.messages.some(m => m.type === 'error')) {
            showError("Shader compile error (see console):\n" + compInfo.messages.filter(m => m.type === 'error').map(m => m.message).join("\n"));
        }

        device.pushErrorScope('validation');
        const pipeline = device.createRenderPipeline({
            label: "Mandelbrot pipeline",
            layout: device.createPipelineLayout({ bindGroupLayouts: [bindGroupLayout] }),
            vertex: { module: shaderModule, entryPoint: "vertexMain" },
            fragment: { module: shaderModule, entryPoint: "fragmentMain", targets: [{ format: canvasFormat }] },
        });
        device.popErrorScope().then((err) => { if (err) showError("Pipeline error:\n" + err.message); });
        const bindGroup = device.createBindGroup({
            label: "Bind group",
            layout: bindGroupLayout,
            entries: [
                { binding: 0, resource: { buffer: uniformBuffer } },
                { binding: 1, resource: { buffer: refBuffer } },
            ],
        });

        // Click to aim the zoom at the complex point under the cursor.
        canvas.addEventListener('click', (event) => {
            // Normalize against the canvas's ON-SCREEN size, not its (smaller,
            // capped) backing-store resolution — otherwise the click maps to the
            // wrong complex point and the zoom flies off target.
            const rect = canvas.getBoundingClientRect();
            const px = (event.clientX - rect.left) / rect.width;   // 0..1
            const py = (event.clientY - rect.top) / rect.height;   // 0..1
            const dcx = (px - 0.5) * viewWidth;
            const dcy = (0.5 - py) * viewWidth * (canvas.height / canvas.width);
            targetX = ddAdd(centerX, [dcx, 0]);
            targetY = ddAdd(centerY, [dcy, 0]);
        });

        // If the GPU driver ever resets the device, stop the loop instead of
        // hammering it further.
        let running = true;
        device.lost.then((info) => {
            running = false;
            showError("GPU device was lost (" + (info.message || info.reason) + ").\nThe render was too heavy — lower MAX_DIM / MAX_ITER_CAP and reload.");
        });

        async function frame() {
            if (!running) return;
            // Don't burn the GPU while the tab is in the background.
            if (document.hidden) { setTimeout(() => requestAnimationFrame(frame), 300); return; }

            // Home the center toward the target while shrinking the view, so the
            // target stays put on screen as everything zooms into it.
            centerX = ddAdd(targetX, ddMulD(ddSub(centerX, targetX), SHRINK));
            centerY = ddAdd(targetY, ddMulD(ddSub(centerY, targetY), SHRINK));
            viewWidth *= SHRINK;
            if (viewWidth < MIN_WIDTH) {        // hit the precision floor -> loop out
                viewWidth = FULL_WIDTH;
                centerX = [0, 0];
                centerY = [0, 0];
            }

            const depth = Math.log10(FULL_WIDTH / viewWidth);
            const maxIter = Math.min(MAX_ITER_CAP, Math.round(120 + 22 * depth));
            const refLen = computeReference(centerX, centerY, maxIter);

            uniformData[0] = canvas.width;
            uniformData[1] = canvas.height;
            uniformData[2] = viewWidth;
            uniformData[3] = canvas.height / canvas.width;
            uniformData[4] = maxIter;
            uniformData[5] = refLen;
            device.queue.writeBuffer(uniformBuffer, 0, uniformData);
            device.queue.writeBuffer(refBuffer, 0, refData, 0, 2 * refLen);

            const encoder = device.createCommandEncoder();
            const pass = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: "clear",
                    clearValue: { r: 0, g: 0, b: 0, a: 1 },
                    storeOp: "store",
                }]
            });
            pass.setPipeline(pipeline);
            pass.setBindGroup(0, bindGroup);
            pass.draw(3);
            pass.end();
            device.queue.submit([encoder.finish()]);

            hud.textContent = `zoom 1 : ${(FULL_WIDTH / viewWidth).toExponential(1)}   iters ${maxIter}   ${canvas.width}×${canvas.height}   (click to aim)`;

            // Wait until the GPU has actually finished this frame before queuing
            // the next one. This is the key safeguard: it prevents frames from
            // backing up and overwhelming/hanging the GPU.
            await device.queue.onSubmittedWorkDone();
            if (running) requestAnimationFrame(frame);
        }

        requestAnimationFrame(frame);
    </script>
  </body>
</html>
