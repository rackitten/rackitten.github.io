<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chladni</title>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #05060a; color: #cdd3e0;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  #gl { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; left: 18px; bottom: 16px; pointer-events: none;
    font-size: 11px; letter-spacing: 0.12em; line-height: 1.6;
    text-transform: uppercase; opacity: 0.0;
    text-shadow: 0 0 12px rgba(0,0,0,0.9);
    transition: opacity 1.2s ease;
  }
  #hud.show { opacity: 0.55; }
  #hud .big { font-size: 13px; letter-spacing: 0.22em; opacity: 0.85; }
  #hint {
    position: fixed; right: 18px; bottom: 16px; pointer-events: none;
    font-size: 10px; letter-spacing: 0.18em; opacity: 0.32;
    text-transform: uppercase;
  }
  #fade {
    position: fixed; inset: 0; background: #05060a; pointer-events: none;
    opacity: 1; transition: opacity 1.4s ease;
  }
  #fade.gone { opacity: 0; }
  #err {
    position: fixed; inset: 0; display: none; place-items: center;
    text-align: center; padding: 40px; font-size: 13px; line-height: 1.8;
  }
  /* --- site nav --- */
  #nav {
    position: fixed; top: 16px; left: 18px; right: 18px;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 16px; z-index: 10; pointer-events: none;
    opacity: 0; transition: opacity 1.4s ease;
  }
  #nav.show { opacity: 1; }
  #nav .brand {
    font-size: 13px; letter-spacing: 0.30em; text-transform: uppercase;
    color: #e7ebf5; pointer-events: auto; text-decoration: none;
    text-shadow: 0 0 18px rgba(0,0,0,0.95); opacity: 0.85;
  }
  #nav .brand:hover { opacity: 1; }
  #nav .links {
    display: flex; flex-wrap: wrap; gap: 18px;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  }
  #nav .links a {
    pointer-events: auto; text-decoration: none; color: #aeb6c8;
    opacity: 0.6; transition: opacity 0.25s ease, color 0.25s ease, text-shadow 0.25s ease;
    text-shadow: 0 0 12px rgba(0,0,0,0.9);
  }
  #nav .links a:hover {
    opacity: 1; color: #fff;
    text-shadow: 0 0 10px rgba(160,190,255,0.85), 0 0 20px rgba(120,150,255,0.5);
  }
  @media (max-width: 560px) {
    #nav { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<nav id="nav">
  <a class="brand" href="./">rackitten</a>
  <div class="links">
    <a href="./values.html">values</a>
    <a href="./fractal.html">heaven</a>
    <a href="./game.html">life</a>
  </div>
</nav>
<div id="hud"></div>
<div id="hint">click / space &nbsp;·&nbsp; new figure</div>
<div id="fade"></div>
<div id="err"></div>

<script type="text/javascript">
(function () {
  "use strict";

  const canvas = document.getElementById("gl");
  const gl = canvas.getContext("webgl2", { antialias: false, alpha: false, powerPreference: "high-performance" });

  if (!gl) {
    const e = document.getElementById("err");
    e.style.display = "grid";
    e.textContent = "WebGL2 is required for this page. Try a recent Chrome, Edge, Firefox or Safari.";
    return;
  }

  // ---- Shaders ---------------------------------------------------------------

  const VERT = `#version 300 es
  in vec2 a_pos;
  void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }`;

  const FRAG = `#version 300 es
  precision highp float;
  out vec4 outColor;

  #define MAXN 8

  uniform vec2  u_res;
  uniform float u_time;
  uniform int   u_count;
  uniform vec4  u_modes[MAXN];   // n, m, amp, phase
  uniform float u_speed[MAXN];   // per-mode morph speed
  uniform vec3  u_pal[4];        // cosine palette a,b,c,d (d packed in .xyz of pal[3])
  uniform float u_warp;          // domain warp amount
  uniform float u_grain;         // sand grain density
  uniform float u_rot;           // base rotation of plate
  uniform float u_seed;

  const float PI = 3.14159265359;

  // iq cosine palette
  vec3 palette(float t) {
    return clamp(u_pal[0] + u_pal[1] * cos(6.28318 * (u_pal[2] * t + u_pal[3])), 0.0, 1.0);
  }

  mat2 rot(float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }

  float hash(vec2 p){
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 78.233);
    return fract(p.x * p.y);
  }

  // Chladni-like plate displacement field on [-1,1]^2
  float plate(vec2 p, float t) {
    float s = 0.0;
    for (int i = 0; i < MAXN; i++) {
      if (i >= u_count) break;
      vec4 md = u_modes[i];
      float n = md.x, m = md.y;
      // slowly breathing amplitude + drifting phase => continuous morph
      float amp = md.z * (0.55 + 0.45 * sin(t * u_speed[i] + md.w * 6.2831));
      float ph  = md.w * 6.2831 + t * u_speed[i] * 0.35;
      // symmetric square-plate eigenmode combination
      float a = cos(n * PI * (p.x*0.5+0.5) + ph) * cos(m * PI * (p.y*0.5+0.5));
      float b = cos(m * PI * (p.x*0.5+0.5))      * cos(n * PI * (p.y*0.5+0.5) + ph);
      s += amp * (a - b);
    }
    return s;
  }

  void main() {
    vec2 frag = gl_FragCoord.xy;
    vec2 uv = (frag - 0.5 * u_res) / min(u_res.x, u_res.y); // square, centered
    uv *= 2.05;

    // slow breathing zoom + base rotation
    float t = u_time;
    float zoom = 1.0 + 0.06 * sin(t * 0.13);
    uv *= zoom;
    uv = rot(u_rot + 0.02 * sin(t * 0.07)) * uv;

    // gentle domain warp for an organic, fluid feel
    vec2 w = uv;
    float wa = u_warp;
    w += wa * vec2(
      sin(uv.y * 2.3 + t * 0.21),
      cos(uv.x * 2.1 - t * 0.18)
    );

    // outside the plate -> fade to dark
    float plateMask = 1.0 - smoothstep(0.98, 1.18, max(abs(uv.x), abs(uv.y)));

    float v  = plate(w, t);

    // analytic-ish gradient via screen-space derivatives -> crisp constant-width nodal lines
    float g = length(vec2(dFdx(v), dFdy(v))) + 1e-5;
    float dist = abs(v) / g; // distance to nodal line in pixels

    // crisp nodal line
    float line = 1.0 - smoothstep(0.0, 1.6, dist);
    // soft glow halo around nodes
    float glow = exp(-dist * 0.14);
    // sand accumulation: grains pile on the nodal lines
    float grainNoise = hash(frag * 1.3 + floor(t*6.0));
    float sand = smoothstep(0.0, 1.0, glow) * step(grainNoise, u_grain * glow);

    // color from the field value + distance, animated through the palette
    float tone = 0.5 + 0.5 * sin(v * 0.9 + t * 0.2);
    vec3 base = palette(tone * 0.6 + 0.12);
    vec3 nodeCol = palette(0.5 + 0.4 * sin(t * 0.15) + dist * 0.02);

    vec3 col = vec3(0.0);
    // faint field shading in the bellies
    col += base * (0.06 + 0.05 * smoothstep(1.0, 6.0, dist));
    // glow halo
    col += nodeCol * glow * 0.9;
    // bright crisp line
    col += (nodeCol * 0.6 + vec3(0.9)) * line * 1.4;
    // sand sparkle
    col += vec3(1.0, 0.96, 0.88) * sand * 1.2;

    col *= plateMask;

    // subtle plate-edge rim light
    float edge = smoothstep(0.9, 1.0, max(abs(uv.x), abs(uv.y))) * plateMask;
    col += nodeCol * edge * 0.25;

    // vignette
    float vig = smoothstep(1.6, 0.3, length(uv));
    col *= 0.35 + 0.65 * vig;

    // film grain
    float fg = hash(frag + t) - 0.5;
    col += fg * 0.025;

    // filmic-ish tone curve + gentle saturation lift
    col = col / (col + 0.7);
    col = pow(col, vec3(0.85));
    float l = dot(col, vec3(0.299, 0.587, 0.114));
    col = mix(vec3(l), col, 1.18);

    outColor = vec4(col, 1.0);
  }`;

  // ---- GL boilerplate --------------------------------------------------------

  function compile(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      throw new Error(gl.getShaderInfoLog(sh));
    }
    return sh;
  }

  let program;
  try {
    program = gl.createProgram();
    gl.attachShader(program, compile(gl.VERTEX_SHADER, VERT));
    gl.attachShader(program, compile(gl.FRAGMENT_SHADER, FRAG));
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(program));
    }
  } catch (ex) {
    const e = document.getElementById("err");
    e.style.display = "grid";
    e.textContent = "Shader error: " + ex.message;
    return;
  }

  const quad = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(program, "a_pos");
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const U = {
    res:   gl.getUniformLocation(program, "u_res"),
    time:  gl.getUniformLocation(program, "u_time"),
    count: gl.getUniformLocation(program, "u_count"),
    modes: gl.getUniformLocation(program, "u_modes"),
    speed: gl.getUniformLocation(program, "u_speed"),
    pal:   gl.getUniformLocation(program, "u_pal"),
    warp:  gl.getUniformLocation(program, "u_warp"),
    grain: gl.getUniformLocation(program, "u_grain"),
    rot:   gl.getUniformLocation(program, "u_rot"),
    seed:  gl.getUniformLocation(program, "u_seed"),
  };

  // ---- Random figure generation ----------------------------------------------

  const rand = (a, b) => a + Math.random() * (b - a);
  const irand = (a, b) => Math.floor(rand(a, b + 1));
  const pick = arr => arr[irand(0, arr.length - 1)];

  // curated cosine-palette presets (iq style) — look-good guaranteed
  const PALETTES = [
    // a, b, c, d
    [[0.5,0.5,0.5],[0.5,0.5,0.5],[1.0,1.0,1.0],[0.00,0.10,0.20]], // rainbow
    [[0.5,0.5,0.5],[0.5,0.5,0.5],[1.0,1.0,0.5],[0.80,0.90,0.30]], // gold/teal
    [[0.6,0.4,0.5],[0.4,0.5,0.5],[1.0,1.0,1.0],[0.00,0.15,0.55]], // magenta/cyan
    [[0.2,0.2,0.3],[0.7,0.6,0.7],[1.0,1.0,1.0],[0.30,0.20,0.20]], // amethyst
    [[0.5,0.5,0.5],[0.5,0.5,0.5],[2.0,1.0,0.0],[0.50,0.20,0.25]], // sunset
    [[0.8,0.5,0.4],[0.2,0.4,0.2],[2.0,1.0,1.0],[0.00,0.25,0.25]], // ember
    [[0.4,0.5,0.6],[0.3,0.3,0.4],[1.5,1.5,1.5],[0.60,0.70,0.80]], // ice
    [[0.5,0.5,0.6],[0.45,0.45,0.5],[1.0,0.7,0.4],[0.00,0.40,0.70]],// aurora
  ];

  let state = null;

  function newFigure() {
    const count = irand(3, 6);
    const modes = new Float32Array(8 * 4);
    const speed = new Float32Array(8);
    const used = new Set();
    const usedModes = [];
    for (let i = 0; i < count; i++) {
      let n, m, key;
      let guard = 0;
      do {
        n = irand(1, 9);
        m = irand(1, 9);
        key = Math.min(n, m) + "," + Math.max(n, m);
        guard++;
      } while ((n === m || used.has(key)) && guard < 40);
      used.add(key);
      usedModes.push([n, m]);
      const amp = (i === 0 ? 1.0 : rand(0.25, 0.85)) * (Math.random() < 0.5 ? 1 : -1);
      modes[i*4+0] = n;
      modes[i*4+1] = m;
      modes[i*4+2] = amp;
      modes[i*4+3] = Math.random();
      speed[i] = rand(0.02, 0.16) * (Math.random() < 0.5 ? 1 : -1);
    }

    const p = pick(PALETTES);
    const pal = new Float32Array(12);
    for (let k = 0; k < 4; k++) {
      pal[k*3+0] = p[k][0]; pal[k*3+1] = p[k][1]; pal[k*3+2] = p[k][2];
    }

    state = {
      count, modes, speed, pal,
      warp: Math.random() < 0.5 ? 0.0 : rand(0.03, 0.16),
      grain: rand(0.25, 0.75),
      rot: rand(0, Math.PI * 2),
      seed: Math.random() * 1000,
      modeList: usedModes,
    };

    // HUD
    const hud = document.getElementById("hud");
    const names = usedModes.map(([n,m]) => n + "·" + m).join("   ");
    hud.innerHTML = '<span class="big">CHLADNI</span><br>modes &nbsp; ' + names +
                    '<br>terms ' + count + ' &nbsp;·&nbsp; warp ' + state.warp.toFixed(2);
    hud.classList.add("show");
  }

  // ---- Resize ----------------------------------------------------------------

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.floor(window.innerWidth * dpr);
    const h = Math.floor(window.innerHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
    }
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener("resize", resize);

  // ---- Render loop -----------------------------------------------------------

  const start = performance.now();
  gl.useProgram(program);

  function frame() {
    resize();
    const t = (performance.now() - start) / 1000;

    gl.uniform2f(U.res, canvas.width, canvas.height);
    gl.uniform1f(U.time, t);
    gl.uniform1i(U.count, state.count);
    gl.uniform4fv(U.modes, state.modes);
    gl.uniform1fv(U.speed, state.speed);
    gl.uniform3fv(U.pal, state.pal);
    gl.uniform1f(U.warp, state.warp);
    gl.uniform1f(U.grain, state.grain);
    gl.uniform1f(U.rot, state.rot);
    gl.uniform1f(U.seed, state.seed);

    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(frame);
  }

  // ---- New-figure interactions (no full reload needed) -----------------------

  function regenerate() {
    const fade = document.getElementById("fade");
    const hud = document.getElementById("hud");
    hud.classList.remove("show");
    fade.classList.remove("gone");
    setTimeout(() => {
      newFigure();
      fade.classList.add("gone");
    }, 220);
  }

  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); regenerate(); }
  });
  canvas.addEventListener("click", regenerate);

  // ---- Go --------------------------------------------------------------------

  newFigure();
  resize();
  requestAnimationFrame(frame);

  // initial fade-in
  setTimeout(() => {
    document.getElementById("fade").classList.add("gone");
    document.getElementById("nav").classList.add("show");
  }, 60);

})();
</script>
</body>
</html>
